<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator.io</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .calculator-app {
            width: 100%;
            max-width: 430px; 
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            justify-content: flex-end;
            background-color: transparent;
            position: relative;
        }

        .display {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 20px 10px;
            font-size: clamp(2.8rem, 12vw, 5rem);
            font-weight: 300;
            color: #00FF66;
            text-align: right;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            transition: color 0.3s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            width: 100%;
        }

        button {
            background-color: #1A1A1A;
            border: none;
            border-radius: 18px;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 500;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s ease, transform 0.05s ease;
        }

        button:active {
            background-color: #333333;
            transform: scale(0.95);
        }

        button.action-btn {
            background-color: #003318;
            color: #00FF66;
        }
        
        button.action-btn:active {
            background-color: #004D26;
        }

        button.operator-btn {
            background-color: #00FF66;
            color: #000000;
            font-weight: 700;
        }

        button.operator-btn:active {
            background-color: #00CC52;
        }

        button.zero-btn {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 100%;
        }

        .install-tip {
            text-align: center;
            font-size: 0.75rem;
            color: #444444;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        /* 👑 SECRET ADMIN SCREEN VIEW */
        .secret-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .secret-menu h2 {
            color: #00FF66;
            margin-bottom: 25px;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .menu-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: #111;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .menu-label {
            font-size: 1rem;
            color: #ccc;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00FF66;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .secret-input {
            background: #222;
            border: 1px solid #00FF66;
            color: #00FF66;
            padding: 10px;
            border-radius: 8px;
            width: 120px;
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .close-btn {
            margin-top: 20px;
            background: #00FF66;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 80%;
            max-width: 200px;
            aspect-ratio: auto;
        }
        
        .credit {
            font-size: 0.65rem;
            color: #444;
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="calculator-app">
        <!-- Control Panel Panel -->
        <div class="secret-menu" id="secretMenu">
            <h2>Stealth Control Panel</h2>
            
            <div class="menu-row">
                <span class="menu-label">Magic Trick Mode</span>
                <label class="switch">
                    <input type="checkbox" id="magicToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="menu-row">
                <span class="menu-label">Target Force Number</span>
                <input type="number" id="magicNumberInput" class="secret-input" value="73">
            </div>

            <button class="close-btn" onclick="closeSecretMenu()">Exit Panel</button>
            <div class="credit">AI Engineering Co-Pilot Setup</div>
        </div>

        <!-- Numbers Window -->
        <div class="display" id="display">0</div>
        
        <!-- Main Panel Matrix Keys -->
        <div class="grid">
            <button class="action-btn" onclick="clearDisplay()">AC</button>
            <button class="action-btn" onclick="appendOperator('/')">÷</button>
            <button class="action-btn" onclick="appendOperator('*')">×</button>
            <button class="operator-btn" onclick="deleteLast()">⌫</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator-btn" onclick="appendOperator('-')">−</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator-btn" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator-btn" style="grid-row: span 2; height: 100%; aspect-ratio: auto;" onclick="calculate()">=</button>

            <button class="zero-btn" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
        </div>
        
        <div class="install-tip">Calculator Engine v2.6</div>
    </div>

    <script>
        const display = document.getElementById('display');
        const secretMenu = document.getElementById('secretMenu');
        const magicToggle = document.getElementById('magicToggle');
        const magicInput = document.getElementById('magicNumberInput');
        
        let currentInput = '0';
        let shouldReset = false;

        // 🔐 FIXED INTERACTIVE TRIGGERS
        const OPEN_MENU_CODE = "9876";   
        const QUICK_ON_CODE = "1234";    
        const QUICK_OFF_CODE = "5676";   

        function appendNumber(num) {
            if (currentInput === '0' || shouldReset) {
                currentInput = num;
                shouldReset = false;
            } else {
                currentInput += num;
            }
            updateDisplay();
            checkSecretCodes();
        }

        function appendOperator(op) {
            shouldReset = false;
            const lastChar = currentInput.slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
            } else {
                currentInput += op;
            }
            updateDisplay();
        }

        function clearDisplay() {

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── CALCULATOR SHELL ── */
    .calc-wrapper {
      position: relative;
      width: 320px;
    }

    .calc {
      background: #16213e;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* ── DISPLAY ── */
    .display-wrap {
      background: #0f3460;
      border-radius: 14px;
      padding: 16px 20px 12px;
      margin-bottom: 16px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
    }

    .magic-badge {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #e94560;
      opacity: 0;
      transition: opacity 0.4s;
      font-weight: 700;
    }
    .magic-badge.visible { opacity: 1; }

    .display-expr {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      min-height: 18px;
      word-break: break-all;
      text-align: right;
    }

    #display {
      font-size: 40px;
      color: #ffffff;
      font-weight: 300;
      letter-spacing: -1px;
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
      transition: color 0.3s;
    }
    #display.magic-result { color: #e94560; }

    /* ── BUTTONS ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      height: 62px;
      cursor: pointer;
      transition: transform 0.08s, filter 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    button:active { transform: scale(0.93); filter: brightness(1.2); }

    .btn-num {
      background: #1a1a40;
      color: #ffffff;
    }
    .btn-op {
      background: #533483;
      color: #ffffff;
    }
    .btn-eq {
      background: #e94560;
      color: #ffffff;
      grid-row: span 2;
    }
    .btn-clear {
      background: #0f3460;
      color: #53c0f0;
    }
    .btn-back {
      background: #0f3460;
      color: #e94560;
    }
    .btn-zero {
      grid-column: span 2;
    }

    /* ── ADMIN OVERLAY ── */
    #adminOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #adminOverlay.open { display: flex; }

    .admin-panel {
      background: #16213e;
      border: 1px solid rgba(233,69,96,0.4);
      border-radius: 20px;
      padding: 28px 24px;
      width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      position: relative;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .admin-title {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e94560;
      font-weight: 700;
    }
    .close-btn {
      background: rgba(233,69,96,0.15);
      color: #e94560;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:active { transform: scale(0.9); }

    .admin-row {
      margin-bottom: 18px;
    }
    .admin-label {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
      display: block;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f3460;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .toggle-label {
      color: #fff;
      font-size: 14px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle input:checked + .slider { background: #e94560; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* Force result input */
    .force-input {
      width: 100%;
      background: #0f3460;
      border: 1px solid rgba(83,52,131,0.5);
      border-radius: 10px;
      color: #fff;
      font-size: 20px;
      font-weight: 300;
      padding: 12px 14px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .force-input:focus { border-color: #e94560; }

    .admin-save {
      width: 100%;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      height: 44px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .admin-save:hover { opacity: 0.88; }

    .admin-codes {
      background: rgba(83,52,131,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      line-height: 1.8;
    }
    .admin-codes span { color: #53c0f0; font-weight: 600; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #533483;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ═══════════════ CALCULATOR ═══════════════ -->
<div class="calc-wrapper">
  <div class="calc">
    <!-- Display -->
    <div class="display-wrap">
      <div class="magic-badge" id="magicBadge">✦ Magic On</div>
      <div class="display-expr" id="expr"></div>
      <div id="display">0</div>
    </div>

    <!-- Buttons -->
    <div class="btn-grid">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-op"    onclick="appendOp('/')">÷</button>
      <button class="btn-op"    onclick="appendOp('*')">×</button>
      <button class="btn-back"  onclick="backspace()">⌫</button>

      <button class="btn-num"  onclick="appendNum('7')">7</button>
      <button class="btn-num"  onclick="appendNum('8')">8</button>
      <button class="btn-num"  onclick="appendNum('9')">9</button>
      <button class="btn-op"   onclick="appendOp('-')">−</button>

      <button class="btn-num"  onclick="appendNum('4')">4</button>
      <button class="btn-num"  onclick="appendNum('5')">5</button>
      <button class="btn-num"  onclick="appendNum('6')">6</button>
      <button class="btn-op"   onclick="appendOp('+')">+</button>

      <button class="btn-num"  onclick="appendNum('1')">1</button>
      <button class="btn-num"  onclick="appendNum('2')">2</button>
      <button class="btn-num"  onclick="appendNum('3')">3</button>
      <button class="btn-eq"   onclick="calculate()">=</button>

      <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
      <button class="btn-num"  onclick="appendDot()">.</button>
    </div>
  </div>
</div>

<!-- ═══════════════ ADMIN PANEL ═══════════════ -->
<div id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">⚙ Control Panel</div>
      <button class="close-btn" onclick="closeAdmin()">✕</button>
    </div>

    <!-- Magic Mode Toggle -->
    <div class="admin-row">
      <span class="admin-label">Magic Trick Mode</span>
      <div class="toggle-row">
        <span class="toggle-label">Force result on =</span>
        <label class="toggle">
          <input type="checkbox" id="magicToggle" onchange="onMagicToggle()" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Force Number -->
    <div class="admin-row">
      <span class="admin-label">Target Force Number</span>
      <input type="text" class="force-input" id="forceInput" placeholder="e.g. 73" maxlength="12" />
    </div>

    <!-- Save -->
    <button class="admin-save" onclick="saveAdmin()">Save &amp; Close</button>

    <!-- Quick Codes Reference -->
    <div class="admin-row" style="margin-top:18px; margin-bottom:0;">
      <span class="admin-label">Quick Codes (type on calc)</span>
      <div class="admin-codes">
        <span>9876</span> — Open this panel<br>
        <span>1234</span> — Enable magic mode<br>
        <span>5676</span> — Disable magic mode
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════════ JAVASCRIPT ═══════════════ -->
<script>
  // ── State ──
  let currentInput  = '0';
  let expression    = '';
  let shouldReset   = false;
  let magicMode     = false;
  let forcedResult  = '73';

  // Secret codes
  const CODE_ADMIN  = '9876';
  const CODE_ON     = '1234';
  const CODE_OFF    = '5676';

  // ── DOM refs ──
  const display    = document.getElementById('display');
  const exprEl     = document.getElementById('expr');
  const magicBadge = document.getElementById('magicBadge');

  // ── Display helpers ──
  function updateDisplay(val) {
    display.textContent = val ?? currentInput;
  }
  function updateExpr(val) {
    exprEl.textContent = val ?? expression;
  }
  function updateBadge() {
    magicBadge.classList.toggle('visible', magicMode);
  }

  // ── Number input ──
  function appendNum(n) {
    if (currentInput === '0' || shouldReset) {
      currentInput = n;
      shouldReset = false;
    } else {
      if (currentInput.length >= 12) return; // max digits
      currentInput += n;
    }
    display.classList.remove('magic-result');
    updateDisplay();
    checkCodes();
  }

  function appendDot() {
    if (shouldReset) { currentInput = '0'; shouldReset = false; }
    if (currentInput.includes('.')) return;
    currentInput += '.';
    updateDisplay();
  }

  // ── Operator input ──
  function appendOp(op) {
    const ops = ['+', '-', '*', '/'];
    // If last char is already an operator, replace it
    if (ops.includes(expression.slice(-1))) {
      expression = expression.slice(0, -1) + op;
    } else {
      expression += currentInput + op;
    }
    currentInput = '0';
    shouldReset = true;
    display.classList.remove('magic-result');
    updateExpr(expression);
    updateDisplay();
  }

  // ── Clear / Backspace ──
  function clearAll() {
    currentInput = '0';
    expression   = '';
    shouldReset  = false;
    display.classList.remove('magic-result');
    updateDisplay();
    updateExpr('');
  }

  function backspace() {
    if (shouldReset) return;
    if (currentInput.length <= 1) {
      currentInput = '0';
    } else {
      currentInput = currentInput.slice(0, -1);
    }
    display.classList.remove('magic-result');
    updateDisplay();
  }

  // ── Calculate ──
  function calculate() {
    if (!expression && currentInput === '0') return;

    const fullExpr = expression + currentInput;
    updateExpr(fullExpr + ' =');

    if (magicMode) {
      // Show forced result with flair
      currentInput = forcedResult;
      expression   = '';
      shouldReset  = true;
      display.classList.add('magic-result');
      updateDisplay(forcedResult);
    } else {
      try {
        // Safe evaluation — only allow numbers and basic operators
        const safe = fullExpr.replace(/[^0-9+\-*/.]/g, '');
        // eslint-disable-next-line no-new-func
        let result = Function('"use strict"; return (' + safe + ')')();
        if (!isFinite(result)) { result = 'Error'; }
        else {
          result = parseFloat(result.toFixed(10)).toString();
        }
        currentInput = result;
        expression   = '';
        shouldReset  = true;
        display.classList.remove('magic-result');
        updateDisplay(result);
      } catch {
        currentInput = 'Error';
        expression   = '';
        shouldReset  = true;
        updateDisplay('Error');
      }
    }
  }

  // ── Secret code detection ──
  function checkCodes() {
    const seq = currentInput;
    if (seq.endsWith(CODE_ADMIN)) {
      clearAll();
      openAdmin();
    } else if (seq.endsWith(CODE_ON)) {
      magicMode = true;
      updateBadge();
      clearAll();
      showToast('✦ Magic mode ON');
    } else if (seq.endsWith(CODE_OFF)) {
      magicMode = false;
      updateBadge();
      clearAll();
      showToast('Magic mode OFF');
    }
  }

  // ── Admin panel ──
  function openAdmin() {
    document.getElementById('magicToggle').checked = magicMode;
    document.getElementById('forceInput').value    = forcedResult;
    document.getElementById('adminOverlay').classList.add('open');
  }

  function closeAdmin() {
    document.getElementById('adminOverlay').classList.remove('open');
  }

  function onMagicToggle() {
    // live preview — not saved until Save is clicked
  }

  function saveAdmin() {
    magicMode    = document.getElementById('magicToggle').checked;
    const val    = document.getElementById('forceInput').value.trim();
    if (val !== '') forcedResult = val;
    updateBadge();
    closeAdmin();
    showToast(magicMode ? `✦ Magic ON → ${forcedResult}` : 'Settings saved');
  }

  // ── Toast notification ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Close admin on overlay click ──
  document.getElementById('adminOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAdmin();
  });

  // ── Keyboard support ──
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('adminOverlay').classList.contains('open')) return;
    if ('0123456789'.includes(e.key)) appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('-');
    else if (e.key === '*') appendOp('*');
    else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            padding-bottom: 20px;
            overflow: hidden;
        }
        .calc-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }
        .display {
            color: #ffffff;
            font-size: 80px;
            font-weight: 300;
            text-align: right;
            margin-bottom: 15px;
            padding: 0 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        button {
            border: none;
            border-radius: 50%;
            font-size: 35px;
            height: 78px;
            width: 78px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: filter 0.1s;
        }
        button:active {
            filter: brightness(1.3);
        }
        .gray {
            background-color: #a5a5a5;
            color: #000000;
        }
        .dark-gray {
            background-color: #333333;
            color: #ffffff;
        }
        .orange {
            background-color: #fe9e09;
            color: #ffffff;
        }
        .zero {
            grid-column: span 2;
            width: 100%;
            border-radius: 40px;
            justify-content: flex-start;
            padding-left: 30px;
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div id="display" class="display">0</div>
        <div class="buttons">
            <button class="gray" onclick="clearCalc()">AC</button>
            <button class="gray" onclick="press('+/-')">+/-</button>
            <button class="gray" onclick="press('%')">%</button>
            <button class="orange" onclick="press('/')">÷</button>

            <button class="dark-gray" onclick="press('7')">7</button>
            <button class="dark-gray" onclick="press('8')">8</button>
            <button class="dark-gray" onclick="press('9')">9</button>
            <button class="orange" onclick="press('*')">×</button>

            <button class="dark-gray" onclick="press('4')">4</button>
            <button class="dark-gray" onclick="press('5')">5</button>
            <button class="dark-gray" onclick="press('6')">6</button>
            <button class="orange" onclick="press('-')">−</button>

            <button class="dark-gray" onclick="press('1')">1</button>
            <button class="dark-gray" onclick="press('2')">2</button>
            <button class="dark-gray" onclick="press('3')">3</button>
            <button class="orange" onclick="press('+')">+</button>

            <button class="dark-gray zero" onclick="press('0')">0</button>
            <button class="dark-gray" onclick="press('.')">.</button>
            <button class="orange" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '';
        
        // CHANGE THIS NUMBER TO YOUR CHOSEN FORCE NUMBER
        const FORCED_NUMBER = "9970443557"; 

        function press(num) {
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateDisplay(currentInput);
        }

        function clearCalc() {
            currentInput = '';
            display.innerText = '0';
            adjustFontSize();
        }

        function updateDisplay(val) {
            let cleanVal = val.replace(/\*/g, '×').replace(/\//g, '÷');
            display.innerText = cleanVal || '0';
            adjustFontSize();
        }

        function calculate() {
            display.innerText = FORCED_NUMBER;
            currentInput = FORCED_NUMBER;
            adjustFontSize();
        }

        function adjustFontSize() {
            const length = display.innerText.length;
            if (length <= 6) {
                display.style.fontSize = '80px';
            } else if (length === 7) {
                display.style.fontSize = '70px';
            } else if (length === 8) {
                display.style.fontSize = '60px';
            } else if (length === 9) {
                display.style.fontSize = '52px';
            } else {
                display.style.fontSize = '42px';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator.io</title>
    
    <!-- Links the app settings file -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Forces iPhones to open it in full-screen app mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* Resets margins and locks screen scaling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Pure black background that takes up the entire mobile screen */
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Fixed Mobile Wrapper: Dynamic sizing ensures it fills mobile screens perfectly */
        .calculator-app {
            width: 100%;
            max-width: 430px; 
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            justify-content: flex-end;
            background-color: #000000;
        }

        /* Matrix Green Number Screen */
        .display {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 20px 10px;
            font-size: clamp(2.8rem, 12vw, 5rem);
            font-weight: 300;
            color: #00FF66;
            text-align: right;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* Grid Layout: Completely fixed sizing bugs across different phone widths */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            width: 100%;
        }

        /* Button Fixes: Large thumb tap targets that do not scale out of proportion */
        button {
            background-color: #1A1A1A;
            border: none;
            border-radius: 18px;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 500;
            aspect-ratio: 1 / 1; /* Keeps buttons perfectly square on all screens */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s ease, transform 0.05s ease;
        }

        /* Instant mobile touch feedback */
        button:active {
            background-color: #333333;
            transform: scale(0.95);
        }

        /* Dark Green Utility Buttons (AC, Clear) */
        button.action-btn {
            background-color: #003318;
            color: #00FF66;
        }
        
        button.action-btn:active {
            background-color: #004D26;
        }

        /* Bright Green Operator Buttons (+, -, =, ⌫) */
        button.operator-btn {
            background-color: #00FF66;
            color: #000000;
            font-weight: 700;
        }

        button.operator-btn:active {
            background-color: #00CC52;
        }

        /* Layout Override: Stretches the '0' button seamlessly over 2 grid slots */
        button.zero-btn {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 100%;
        }

        /* Bottom setup instruction hint */
        .install-tip {
            text-align: center;
            font-size: 0.75rem;
            color: #444444;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="calculator-app">
        <!-- Display Screen -->
        <div class="display" id="display">0</div>
        
        <!-- Calculator Button Array -->
        <div class="grid">
            <button class="action-btn" onclick="clearDisplay()">AC</button>
            <button class="action-btn" onclick="appendOperator('/')">÷</button>
            <button class="action-btn" onclick="appendOperator('*')">×</button>
            <button class="operator-btn" onclick="deleteLast()">⌫</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator-btn" onclick="appendOperator('-')">−</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator-btn" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator-btn" style="grid-row: span 2; height: 100%; aspect-ratio: auto;" onclick="calculate()">=</button>

            <button class="zero-btn" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
        </div>
        
        <div class="install-tip">Tap browser menu → "Add to Home Screen" to use full app view</div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '0';
        let shouldReset = false;

        function appendNumber(num) {
            if (currentInput === '0' || shouldReset) {
                currentInput = num;
                shouldReset = false;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            shouldReset = false;
            const lastChar = currentInput.slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
            } else {
                currentInput += op;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            try {
                let sanitizedInput = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(sanitizedInput);
                
                // Prevents infinite JavaScript rounding errors (e.g. 0.1 + 0.2)
                currentInput = String(Number(result.toFixed(8))); 
                shouldReset = true;
                updateDisplay();
            } catch (e) {
                display.innerText = 'Error';
                currentInput = '0';
                shouldReset = true;
            }
        }

        function updateDisplay() {
            display.innerText = currentInput;
            // Automatically scrolls screen display to the right as numbers get longer
            display.scrollLeft = display.scrollWidth;
        }
    </script>
</body>
</html>

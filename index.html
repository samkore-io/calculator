<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .calc-wrapper { position: relative; width: 320px; }

    .calc {
      background: #0a0a0a;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,200,80,0.12);
    }

    /* ── DISPLAY ── */
    .display-wrap {
      background: #0d1a0f;
      border-radius: 14px;
      padding: 16px 20px 12px;
      margin-bottom: 16px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(0,200,80,0.15);
    }

    .display-expr {
      font-size: 13px;
      color: rgba(0,200,80,0.4);
      min-height: 18px;
      word-break: break-all;
      text-align: right;
    }

    #display {
      font-size: 40px;
      color: #00e864;
      font-weight: 300;
      letter-spacing: -1px;
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
    }

    /* ── BUTTONS ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      height: 62px;
      cursor: pointer;
      transition: transform 0.08s, filter 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    button:active { transform: scale(0.93); filter: brightness(1.3); }

    .btn-num {
      background: #111a12;
      color: #00e864;
      border: 1px solid rgba(0,200,80,0.15);
    }
    .btn-op {
      background: #0d2e14;
      color: #00e864;
      border: 1px solid rgba(0,200,80,0.25);
    }
    .btn-eq {
      background: #00c850;
      color: #000000;
      font-weight: 700;
      grid-row: span 2;
      border: none;
    }
    .btn-clear {
      background: #0d2e14;
      color: #00e864;
      border: 1px solid rgba(0,200,80,0.3);
    }
    .btn-back {
      background: #0d2e14;
      color: #00e864;
      border: 1px solid rgba(0,200,80,0.3);
    }
    .btn-zero { grid-column: span 2; }

    /* ── ADMIN OVERLAY ── */
    #adminOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #adminOverlay.open { display: flex; }

    .admin-panel {
      background: #0a0a0a;
      border: 1px solid rgba(0,200,80,0.35);
      border-radius: 20px;
      padding: 28px 24px;
      width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 30px rgba(0,200,80,0.08);
      position: relative;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .admin-title {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00c850;
      font-weight: 700;
    }
    .close-btn {
      background: rgba(0,200,80,0.1);
      color: #00c850;
      border: 1px solid rgba(0,200,80,0.2);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:active { transform: scale(0.9); }

    .admin-row { margin-bottom: 18px; }

    .admin-label {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(0,200,80,0.45);
      margin-bottom: 8px;
      display: block;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1a0f;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(0,200,80,0.1);
    }
    .toggle-label { color: #00e864; font-size: 14px; }

    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }
    .toggle input:checked + .slider { background: rgba(0,200,80,0.3); }
    .toggle input:checked + .slider::before { transform: translateX(20px); background: #00c850; }

    .force-input {
      width: 100%;
      background: #0d1a0f;
      border: 1px solid rgba(0,200,80,0.25);
      border-radius: 10px;
      color: #00e864;
      font-size: 20px;
      font-weight: 300;
      padding: 12px 14px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .force-input:focus { border-color: #00c850; }
    .force-input::placeholder { color: rgba(0,200,80,0.25); }

    .admin-save {
      width: 100%;
      background: #00c850;
      color: #000;
      border: none;
      border-radius: 10px;
      height: 44px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .admin-save:hover { opacity: 0.88; }

    .admin-codes {
      background: rgba(0,200,80,0.05);
      border: 1px solid rgba(0,200,80,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: rgba(0,200,80,0.5);
      line-height: 1.8;
    }
    .admin-codes span { color: #00c850; font-weight: 600; }
  </style>
</head>
<body>

<!-- CALCULATOR -->
<div class="calc-wrapper">
  <div class="calc">
    <div class="display-wrap">
      <div class="display-expr" id="expr"></div>
      <div id="display">0</div>
    </div>
    <div class="btn-grid">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-op"    onclick="appendOp('/')">÷</button>
      <button class="btn-op"    onclick="appendOp('*')">×</button>
      <button class="btn-back"  onclick="backspace()">⌫</button>

      <button class="btn-num"  onclick="appendNum('7')">7</button>
      <button class="btn-num"  onclick="appendNum('8')">8</button>
      <button class="btn-num"  onclick="appendNum('9')">9</button>
      <button class="btn-op"   onclick="appendOp('-')">−</button>

      <button class="btn-num"  onclick="appendNum('4')">4</button>
      <button class="btn-num"  onclick="appendNum('5')">5</button>
      <button class="btn-num"  onclick="appendNum('6')">6</button>
      <button class="btn-op"   onclick="appendOp('+')">+</button>

      <button class="btn-num"  onclick="appendNum('1')">1</button>
      <button class="btn-num"  onclick="appendNum('2')">2</button>
      <button class="btn-num"  onclick="appendNum('3')">3</button>
      <button class="btn-eq"   onclick="calculate()">=</button>

      <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
      <button class="btn-num"  onclick="appendDot()">.</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">⚙ Control Panel</div>
      <button class="close-btn" onclick="closeAdmin()">✕</button>
    </div>

    <div class="admin-row">
      <span class="admin-label">Magic Trick Mode</span>
      <div class="toggle-row">
        <span class="toggle-label">Force result on =</span>
        <label class="toggle">
          <input type="checkbox" id="magicToggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="admin-row">
      <span class="admin-label">Target Force Number</span>
      <input type="text" class="force-input" id="forceInput" placeholder="e.g. 73" maxlength="12" />
    </div>

    <button class="admin-save" onclick="saveAdmin()">Save &amp; Close</button>

    <div class="admin-row" style="margin-top:18px; margin-bottom:0;">
      <span class="admin-label">Quick Codes (type on calc, press =)</span>
      <div class="admin-codes">
        <span>9876</span> — Open this panel<br>
        <span>1234</span> — Enable magic mode<br>
        <span>5676</span> — Disable magic mode
      </div>
    </div>
  </div>
</div>

<script>
  let currentInput = '0';
  let expression   = '';
  let shouldReset  = false;
  let magicMode    = false;
  let forcedResult = '73';

  const CODE_ADMIN = '9876';
  const CODE_ON    = '1234';
  const CODE_OFF   = '5676';

  const display = document.getElementById('display');
  const exprEl  = document.getElementById('expr');

  function updateDisplay(val) { display.textContent = val ?? currentInput; }
  function updateExpr(val)    { exprEl.textContent   = val ?? expression; }

  function appendNum(n) {
    if (currentInput === '0' || shouldReset) {
      currentInput = n;
      shouldReset  = false;
    } else {
      if (currentInput.length >= 12) return;
      currentInput += n;
    }
    updateDisplay();
  }

  function appendDot() {
    if (shouldReset) { currentInput = '0'; shouldReset = false; }
    if (currentInput.includes('.')) return;
    currentInput += '.';
    updateDisplay();
  }

  function appendOp(op) {
    const ops = ['+', '-', '*', '/'];
    if (ops.includes(expression.slice(-1))) {
      expression = expression.slice(0, -1) + op;
    } else {
      expression += currentInput + op;
    }
    currentInput = '0';
    shouldReset  = true;
    updateExpr(expression);
    updateDisplay();
  }

  function clearAll() {
    currentInput = '0';
    expression   = '';
    shouldReset  = false;
    updateDisplay();
    updateExpr('');
  }

  function backspace() {
    if (shouldReset) return;
    currentInput = currentInput.length <= 1 ? '0' : currentInput.slice(0, -1);
    updateDisplay();
  }

  function calculate() {
    const seq = currentInput;
    if (seq === CODE_ADMIN || seq.endsWith(CODE_ADMIN)) {
      clearAll();
      openAdmin();
      return;
    }
    if (seq === CODE_ON || seq.endsWith(CODE_ON)) {
      magicMode = true;
      clearAll();
      return;
    }
    if (seq === CODE_OFF || seq.endsWith(CODE_OFF)) {
      magicMode = false;
      clearAll();
      return;
    }

    if (!expression && currentInput === '0') return;

    const fullExpr = expression + currentInput;
    updateExpr(fullExpr + ' =');

    if (magicMode) {
      currentInput = forcedResult;
      expression   = '';
      shouldReset  = true;
      updateDisplay(forcedResult);
    } else {
      try {
        const safe   = fullExpr.replace(/[^0-9+\-*/.]/g, '');
        let result   = Function('"use strict"; return (' + safe + ')')();
        if (!isFinite(result)) { result = 'Error'; }
        else { result = parseFloat(result.toFixed(10)).toString(); }
        currentInput = result;
        expression   = '';
        shouldReset  = true;
        updateDisplay(result);
      } catch {
        currentInput = 'Error';
        expression   = '';
        shouldReset  = true;
        updateDisplay('Error');
      }
    }
  }

  function openAdmin() {
    document.getElementById('magicToggle').checked = magicMode;
    document.getElementById('forceInput').value    = forcedResult;
    document.getElementById('adminOverlay').classList.add('open');
  }

  function closeAdmin() {
    document.getElementById('adminOverlay').classList.remove('open');
  }

  function saveAdmin() {
    magicMode = document.getElementById('magicToggle').checked;
    const val = document.getElementById('forceInput').value.trim();
    if (val !== '') forcedResult = val;
    closeAdmin();
  }

  document.getElementById('adminOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAdmin();
  });

  document.addEventListener('keydown', function(e) {
    if (document.getElementById('adminOverlay').classList.contains('open')) return;
    if ('0123456789'.includes(e.key)) appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('-');
    else if (e.key === '*') appendOp('*');
    else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
